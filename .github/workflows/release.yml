name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: oso
            platform: linux/amd64
            os: ubuntu-latest
            package: false
          - name: oso
            platform: windows/amd64
            os: windows-latest
            package: false
          - name: oso
            platform: darwin/universal
            os: macos-latest
            package: false

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Parse version from tag
        id: version
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build Wails app
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: ${{ matrix.build.package }}
          go-version: "1.25.1"
          node-version: "24.x"
          go-build-flags: -ldflags "-X main.version=${{ steps.version.outputs.APP_VERSION }}"

      - name: Make Linux binary executable
        if: runner.os == 'Linux'
        run: chmod +x build/bin/${{ matrix.build.name }}

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: mv build/bin/${{ matrix.build.name }} build/bin/${{ matrix.build.name }}-linux-amd64

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: wails build -nsis -skipbindings -s -ldflags "-X main.version=${{ steps.version.outputs.APP_VERSION }}"

      - name: List build output after NSIS (debug)
        if: runner.os == 'Windows'
        shell: bash
        run: ls -laR build/bin/

      - name: Rename Windows artifacts
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv build/bin/${{ matrix.build.name }} build/bin/${{ matrix.build.name }}-windows-amd64.exe
          mv build/bin/${{ matrix.build.name }}-amd64-installer.exe build/bin/${{ matrix.build.name }}-windows-amd64-installer.exe

      - name: Package macOS app
        if: runner.os == 'macOS'
        working-directory: build/bin
        run: |
          chmod +x ${{ matrix.build.name }}.app/Contents/MacOS/*
          ditto -c -k --keepParent ${{ matrix.build.name }}.app ${{ matrix.build.name }}-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oso-${{ runner.os }}
          path: |
            build/bin/*-linux-amd64
            build/bin/*-windows-amd64.exe
            build/bin/*-windows-amd64-installer.exe
            build/bin/*-macos-universal.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
