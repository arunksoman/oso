services:
  minio:
    image: minio/minio:latest
    container_name: oso-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: osodev
      MINIO_ROOT_PASSWORD: osodevpass
      MINIO_SERVER_URL: http://localhost:9000
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker-data/minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: oso-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - /init.sh
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    restart: "no"

# MinIO connection values:
#   S3_ENDPOINT=http://localhost:9000
#   S3_ACCESS_KEY=osodev
#   S3_SECRET_KEY=osodevpass
#   S3_REGION=us-east-1
#   WebUI: http://localhost:9001  (login: osodev / osodevpass)
